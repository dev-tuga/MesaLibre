services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mesalibre
      POSTGRES_PASSWORD: mesalibre
      POSTGRES_DB: mesalibre
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesalibre -d mesalibre"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
